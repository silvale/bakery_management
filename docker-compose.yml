services:
  db:
    image: postgres:15-alpine
    container_name: bakery-db
    environment:
      POSTGRES_DB: bakery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    # Thêm đoạn này để kiểm tra trạng thái DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bakery_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bakery-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # Chỉ chạy app khi db đã "healthy"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bakery_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres